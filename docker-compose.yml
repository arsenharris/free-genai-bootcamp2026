  ######## USEFUL DOCKER COMMANDS ########

# To pull the latest images (if using pre-built images from a registry):
# docker pull <image_name>
# example:  docker pull opea/speecht5:latest

# To see running containers:
# docker ps

# To list all containers (including stopped ones):
# docker ps -a

# To start container
# docker start <container_name>
# example:  docker start megaservice

# To stop container
# docker stop <container_name>
# example:  docker stop megaservice

# To restart container
# docker restart <container_name>
# example:  docker restart megaservice

# To see logs of a container
# docker logs <container_name>
# example:  docker logs megaservice

# To see live logs of a container
# docker logs -f <container_name>
# example:  docker logs -f megaservice

# To enter a container (assuming it has bash installed)
# docker exec -it <container_name> bash
# example:  docker exec -it megaservice bash

# To see docker images on your machine
# docker images

#To remove Docker containers  
# docker rm <container_name>
# example:  docker rm megaservice

# To force remove a running container (be careful with this command)
# docker rm -f <container_name>
# example:  docker rm -f megaservice

# To remove images 
# docker rmi <image_name>
# example:  docker rmi opea/tts

# To check volumes
# docker volume ls

# Docker compose commands (run these in the directory where docker-compose.yml is located):
# docker compose up

# To run in detached mode (in the background):
# docker compose up -d

# To stop the services:
# docker compose down

# To restart the services:
# docker compose restart

# To see CPU+RAM usage of containers:
# docker stats

# To run the runtime container
# docker run -d --name container-name image-name
# example: docker run -d --name new-tts opea/tts

